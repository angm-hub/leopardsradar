<!doctype html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Léopards Radar — Redirection…</title>
    <meta name="description" content="Toute la data du football congolais. Roster RDC, diaspora éligible, statut FIFA recalculé chaque dimanche." />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <style>
      body { background: #050B1A; color: #ECE8DD; font-family: system-ui, sans-serif; margin: 0; min-height: 100dvh; display: grid; place-items: center; }
      p { font-size: 14px; opacity: 0.7; letter-spacing: 0.18em; text-transform: uppercase; }
    </style>
    <!-- ====================================================================
         SPA fallback pour GitHub Pages — hack rafgraph (single-page-apps).
         Sprint 1.1 du brief Léopards Radar v3 (2026-05-15).

         GH Pages ne sait pas faire de SPA rewrite côté serveur. Quand un
         visiteur tape /leopardsradar/roster directement (lien WhatsApp,
         refresh, bookmark), le serveur retourne 404 + ce fichier. Le
         script ci-dessous encode l'URL demandée dans un query string
         puis redirige vers /leopardsradar/?/roster — qui charge index.html
         (HTTP 200). Le décodeur dans index.html restaure l'URL réelle
         via history.replaceState avant que React Router ne s'initialise.

         pathSegmentsToKeep = 1 → préserve le segment "/leopardsradar"
         qui est le base path du repo GitHub Pages.

         Source : https://github.com/rafgraph/spa-github-pages
         ==================================================================== -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <p>Redirection en cours…</p>
  </body>
</html>
