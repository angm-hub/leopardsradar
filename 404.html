    <!-- Favicon — relative path so the asset resolves under /leopardsradar/
         on GH Pages (and keeps working at root in dev). Removes the
         /favicon.ico 404 from the console. -->

    <!-- RSS feed — generated at build time from the published articles in
         the `articles` Supabase table. Discoverable by readers (Feedly,
         NetNewsWire, etc.) via the alternate link in <head>. -->

    <!-- Geist (Vercel · OFL) — single-family stack, mode "Premium DA Cobalt".
         La hiérarchie passe par tracking + poids, pas par mélange serif/mono.
         Preconnect + display=swap pour préserver le LCP. fonts.css legacy
         conservé en bas pour cascade graceful sur les composants pas encore
         migrés (Fraunces / DM Sans / Space Mono restent disponibles si une
         classe les nomme explicitement). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap"

    />
