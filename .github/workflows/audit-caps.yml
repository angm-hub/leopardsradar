name: Audit Caps Consistency

# ──────────────────────────────────────────────────────────────────────
# Léopards Radar — Audit hebdo de cohérence caps (cache vs sélections réelles).
#
# Détecte les joueurs roster dont players.caps_rdc diffère de plus de 2
# du vrai COUNT(selections) avec federation_code=COD et category A-level.
# Écrit les findings dans caps_audit_findings pour revue via admin Supabase.
#
# Prérequis : migration 2026_05_15_caps_audit_findings.sql appliquée.
# ──────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Lundi 05:00 UTC = Lundi 06:00 Paris (UTC+1) / 07:00 (UTC+2 été)
    # Après backfill-photos (04h) pour éviter la concurrence Supabase
    - cron: '0 5 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'dry-run : affiche sans écrire en base (true/false)'
        required: false
        default: 'false'
      gap_threshold:
        description: 'Seuil d''écart pour alerte (défaut 2)'
        required: false
        default: '2'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30     # ~65 joueurs × 1 req Supabase = quelques secondes

    concurrency:
      group: audit-caps
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run audit
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        working-directory: scripts
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.gap_threshold }}" ]; then
            ARGS="$ARGS --gap-threshold ${{ github.event.inputs.gap_threshold }}"
          fi
          python audit_caps_consistency.py $ARGS
