name: Insert Arcial Nzamu Ena (one-shot)

# Workflow one-shot : insère Arcial Guylain Nzamu Ena (TM 1472856) en BDD.
# Signalé manquant par Alexandre le 2026-05-16.
# À déclencher manuellement depuis GitHub Actions → workflow_dispatch.
# Idempotent : si Nzamu Ena est déjà en BDD, le script le détecte et skip.
# À supprimer une fois confirmé en BDD.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  insert-nzamu:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Insert Nzamu Ena
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        working-directory: scripts
        run: python insert_arcial_nzamu.py
