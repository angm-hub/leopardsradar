name: Scrape RDC lineups historiques

# ──────────────────────────────────────────────────────────────────────
# Scrape l'historique des compositions RDC A depuis Transfermarkt.
# Source : spielplandatum + aufstellung pages pour chaque match.
# Filtre depuis le 07/08/2022 (prise de fonction Desabre).
#
# Cron : mensuel (1er du mois 03:00 UTC) + workflow_dispatch apres
# chaque fenetre FIFA (qualifier, CAN, amicaux).
#
# Un run complet prend ~20-40 min selon le nombre de matchs
# (3s rate-limit TM × N matchs × 2 pages par match).
#
# Secrets requis :
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
# ──────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 3 1 * *'    # 1er du mois 03:00 UTC
  workflow_dispatch:
    inputs:
      from_date:
        description: 'Date de debut (YYYY-MM-DD, defaut: 2022-08-07)'
        required: false
        default: '2022-08-07'
      limit:
        description: 'Limite le nombre de matchs traites (test)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — pas d''ecriture en BDD'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    concurrency:
      group: scrape-rdc-lineups
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - run: pip install -r scripts/requirements.txt

      - name: Scrape compositions RDC A
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        working-directory: scripts
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ github.event.inputs.from_date }}" ]; then ARGS="$ARGS --from-date ${{ github.event.inputs.from_date }}"; fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"; fi
          python scrape_rdc_lineups.py $ARGS

      - name: Recompute Desabre XI (si scrape OK)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        working-directory: scripts
        run: python compute_desabre_xi.py --refresh-view
