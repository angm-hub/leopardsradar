name: Sync stats multi-source

# ──────────────────────────────────────────────────────────────────────
# Pipeline cascade FBRef -> TM -> Soccerway -> Sofascore -> Understat.
#
# Pour chaque joueur, tente les sources dans l'ordre et s'arrete quand
# goals + assists + minutes sont tous presents (is_canonical=true).
# Ecrit dans player_stats_multi (detail par source) et players.season_*
# (totaux saison pour le frontend).
#
# Cron : daily 04:00 UTC. Run ~30-45 min pour ~350+ joueurs.
# Apres le scraping, aggregate_player_stats.py merge vers players.season_*.
#
# Secrets requis :
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
# ──────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 4 * * *'    # Quotidien 04:00 UTC
  workflow_dispatch:
    inputs:
      limit:
        description: 'Limite le nombre de joueurs (test)'
        required: false
        default: ''
      player_id:
        description: 'ID Supabase d''un joueur unique (test cible)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — pas d''ecriture en BDD'
        required: false
        default: 'false'
        type: boolean
      skip_fbref:
        description: 'Sauter FBRef (tester Soccerway/Sofascore)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    concurrency:
      group: sync-stats-multi
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - run: pip install -r scripts/requirements.txt

      - name: Install Playwright Chromium (pour FBRef)
        run: python -m playwright install --with-deps chromium

      - name: Sync stats multi-source (cascade)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        working-directory: scripts
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ github.event.inputs.skip_fbref }}" = "true" ]; then ARGS="$ARGS --skip-fbref"; fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"; fi
          if [ -n "${{ github.event.inputs.player_id }}" ]; then ARGS="$ARGS --player ${{ github.event.inputs.player_id }}"; fi
          python sync_stats_multi.py $ARGS

      - name: Aggregate vers players.season_* (merge canonical)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        working-directory: scripts
        run: python aggregate_player_stats.py
