name: Restore Names from Slug (incident 2026-05-16)

# One-shot : restaure les 500 noms ecrases en 'Unknown XXX' par le
# sync TM Playwright run #9 (parser fail silencieux, slug intact).
# A supprimer une fois execute.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (n\'ecrit pas en BDD)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r scripts/requirements.txt
      - name: Restore names
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        working-directory: scripts
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="--dry-run"; fi
          python restore_names_from_slug.py $ARGS
