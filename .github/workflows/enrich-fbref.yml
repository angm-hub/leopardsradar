name: Enrich via FBRef (one-shot)

# Enrichit current_club + image_url + position pour les joueurs avec
# fbref_id en BDD (cible : ~355 sans current_club). Playwright Chromium
# pour bypass Cloudflare.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Limite (vide = tous)"
        required: false
        default: ""
      dry_run:
        description: "Dry run"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r scripts/requirements.txt
      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium
      - name: Run enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        working-directory: scripts
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"; fi
          python enrich_via_fbref.py $ARGS
