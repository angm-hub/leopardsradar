name: Sync Matchs RDC (Wikipedia → Supabase)

# ──────────────────────────────────────────────────────────────────────
# Léopards Radar — Sync quotidien des matchs de l'équipe nationale RDC.
#
# Source primaire : Wikipedia Mediawiki API (gratuit, sans clé)
#   - Page "DR Congo national football team results (2020–present)"
#   - Page "2026 FIFA World Cup Group K"
#
# Cadence : 06:00 UTC chaque jour (08:00 Paris été / 07:00 Paris hiver)
# Durée estimée : < 60 secondes (2 calls HTTP Wikipedia + Supabase)
#
# Secrets requis (GitHub Settings → Secrets → Actions) :
#   SUPABASE_URL              → https://xxxxx.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY → secret key (pas l'anon key)
#
# Aucune clé API tierce requise — Wikipedia est gratuit et sans compte.
# ──────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Tous les jours à 06:00 UTC = 08:00 Paris (UTC+2 été)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'dry-run : affiche sans écrire en base (true/false)'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15     # Le job est très court — 15 min est largement suffisant

    concurrency:
      group: sync-matches-rdc
      cancel-in-progress: false   # Jamais annuler un run en cours — évite les demi-insertions

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        working-directory: scripts
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python sync_matches_rdc.py $ARGS
