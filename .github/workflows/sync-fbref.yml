name: Sync FBRef stats

# ──────────────────────────────────────────────────────────────────────
# Sprint 3.2 du brief Léopards Radar v3 (2026-05-15).
#
# Scrape les stats StatsBomb publiques de FBRef pour les ~355 joueurs
# ayant un fbref_id (renseigné via Wikidata SPARQL au Sprint 3.1).
#
# Cron : dimanche 04h UTC (hebdomadaire) — après sync-transfermarkt (02h)
# et avant compute-scores (10h, Sprint 4) + refresh-insights (14h).
#
# Rate limit FBRef : 4 sec / requête → ~24 min pour 355 joueurs. Marge
# largement dans les 360 min mensuelles GH Actions free.
#
# Stats récupérées (1ère version) : matches, minutes, goals, assists, xG,
# xAG par competition × season. Les stats avancées (passes, défense,
# pressing) viennent dans une 2ème vague une fois le pipeline validé.
# ──────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 4 * * 0'   # Dimanche 04h UTC
  workflow_dispatch:
    inputs:
      limit:
        description: 'Limite le nombre de joueurs traités (test)'
        required: false
        default: ''
      player_id:
        description: 'ID Supabase d''un joueur unique (test ciblé)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — pas d''écriture en BDD'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    concurrency:
      group: sync-fbref
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - run: pip install -r scripts/requirements.txt

      - name: Sync FBRef stats
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        working-directory: scripts
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"; fi
          if [ -n "${{ github.event.inputs.player_id }}" ]; then ARGS="$ARGS --player ${{ github.event.inputs.player_id }}"; fi
          python sync_fbref_stats.py $ARGS
