name: Sync FBRef stats

# ──────────────────────────────────────────────────────────────────────
# Sprint 3.2 du brief Léopards Radar v3 (2026-05-15).
#
# Scrape les stats StatsBomb publiques de FBRef pour les ~355 joueurs
# ayant un fbref_id (renseigné via Wikidata SPARQL au Sprint 3.1).
#
# IMPORTANT : FBRef est passé sur Cloudflare avec protection bot avancée
# en 2024. requests / cloudscraper / curl_cffi sont tous bloqués 403.
# Seul Playwright (vrai Chromium headless) passe le challenge — d'où
# l'install de chromium dans le step ci-dessous.
#
# Cron : dimanche 04h UTC (hebdomadaire) — après sync-transfermarkt (02h)
# et avant compute-scores (10h, Sprint 4) + refresh-insights (14h).
#
# Rate limit FBRef : 4 sec / requête + ~8 sec attente Cloudflare =
# ~12 sec / joueur. ~355 joueurs × 12 sec = ~70 min. Marge dans les
# 360 min/mois GH Actions free.
#
# Stats récupérées (v1) : matches, minutes, goals, assists, xG, xAG par
# competition × season depuis stats_standard_dom_lg. Stats avancées
# (passes, défense, pressing) viennent en v2.
# ──────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 4 * * 0'   # Dimanche 04h UTC
  workflow_dispatch:
    inputs:
      limit:
        description: 'Limite le nombre de joueurs traités (test)'
        required: false
        default: ''
      player_id:
        description: 'ID Supabase d''un joueur unique (test ciblé)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — pas d''écriture en BDD'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    # Run du 2026-05-15 18:13 a hit 90 min exactement (355 joueurs × 13-15 sec).
    # Bump à 180 min + script optimisé (DELAY 2s, skip CF wait quand titre OK).
    # Cible : ~30-40 min wall time.
    timeout-minutes: 180

    concurrency:
      group: sync-fbref
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - run: pip install -r scripts/requirements.txt

      # Install Chromium pour Playwright (~150 MB, ~30 sec). Skip firefox/webkit.
      # Cache géré par Playwright lui-même via ~/.cache/ms-playwright (réutilisé
      # entre runs grâce au cache: 'pip' qui sauve aussi ~/.cache via setup-python).
      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Sync FBRef stats
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        working-directory: scripts
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"; fi
          if [ -n "${{ github.event.inputs.player_id }}" ]; then ARGS="$ARGS --player ${{ github.event.inputs.player_id }}"; fi
          python sync_fbref_stats.py $ARGS
