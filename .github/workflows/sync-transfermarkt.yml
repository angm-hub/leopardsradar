name: Sync Transfermarkt RDC pool

# ──────────────────────────────────────────────────────────────────────
# Léopards Radar — Job hebdo de refresh des profils Transfermarkt.
# Tourne tous les dimanches 03:00 UTC.
#
# Repo public → minutes GitHub Actions illimitées.
# Refresh incrémental : 200 joueurs / run (les plus anciens d'abord).
# Couverture complète d'un pool de 1500 joueurs en ~8 semaines.
# ──────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Sunday 03:00 UTC = Sunday 04:00 Paris (UTC+1) / 05:00 (UTC+2 été)
    - cron: '0 3 * * 0'
  workflow_dispatch:        # déclenchement manuel depuis l'UI GitHub
    inputs:
      batch_size:
        description: 'Number of players to refresh (default 200)'
        required: false
        default: '200'
      rate_limit:
        description: 'Seconds between Transfermarkt requests (default 3.0)'
        required: false
        default: '3.0'

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 350     # max 5h50 (limite GH = 6h)
    concurrency:
      group: sync-transfermarkt
      cancel-in-progress: false   # un run en cours bloque les suivants

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '200' }}
          RATE_LIMIT_SECONDS: ${{ github.event.inputs.rate_limit || '3.0' }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        working-directory: scripts
        run: python sync_transfermarkt.py
