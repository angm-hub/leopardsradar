name: Sync Understat stats

# ──────────────────────────────────────────────────────────────────────
# Sprint 3C du brief Léopards Radar v3 (2026-05-15).
#
# Source alternative à FBRef pour les stats xG/xA fiables. Couvre les
# 6 ligues européennes du top via l'endpoint AJAX
# /main/getPlayersStats/. Pas de Cloudflare, pas de Playwright —
# requests JSON simple, ~10 sec total pour scanner les 6 ligues.
#
# Cron : dimanche 03h30 UTC (entre sync-transfermarkt 02h et
# sync-fbref 04h). Job rapide (<2 min) — pas de risque de coût GH Actions.
#
# Stats inserées dans player_stats_advanced avec source='understat'.
# Les vues consommatrices peuvent prendre la moyenne entre 'fbref' et
# 'understat' pour les joueurs qui ont les deux sources (cross-validation
# Sprint 6).
# ──────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '30 3 * * 0'   # Dimanche 03h30 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — pas d''écriture en BDD'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    concurrency:
      group: sync-understat
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - run: pip install -r scripts/requirements.txt

      - name: Sync Understat
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        working-directory: scripts
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python sync_understat.py $ARGS
