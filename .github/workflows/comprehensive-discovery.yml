name: Comprehensive discovery v2 (multi-source)

# Discovery v2 : couvre les gaps laissés par les 3 scripts existants.
# Déclencheur : samedi 01h UTC (hors des autres crons) + workflow_dispatch.
# Cas Munongo : Lorient Ligue 1, binational non déclaré RDC, patronyme "Munongo"
# présent dans la whitelist mais club non scanné par discover_by_surname → gap comblé ici.

on:
  schedule:
    # Samedi 01h UTC — hors des autres jobs (sync hebdo : lundi, discovery : dimanche)
    - cron: '0 1 * * 6'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (liste sans insérer)'
        required: false
        default: 'false'
        type: boolean
      methods:
        description: 'Méthodes à exécuter (virgule-séparées : A,B,C,D)'
        required: false
        default: 'A,B,C,D'
        type: string

permissions:
  contents: read

jobs:
  comprehensive-discovery:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: comprehensive-discovery
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run comprehensive discovery
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RATE_LIMIT_SECONDS: '1.5'
        working-directory: scripts
        run: |
          DRY_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          METHODS="${{ inputs.methods }}"
          if [ -z "$METHODS" ]; then
            METHODS="A,B,C,D"
          fi
          python comprehensive_discovery.py $DRY_FLAG --methods "$METHODS"
