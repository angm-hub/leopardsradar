name: Comprehensive discovery v3 (multi-source + squad nationality scan)

# Discovery v3 : couvre les gaps laissés par les 3 scripts existants.
# Déclencheur : samedi 01h UTC (hors des autres crons) + workflow_dispatch.
#
# Méthodes disponibles :
#   A — Scan clubs pros (filtre patronyme bantu)
#   B — Wikipedia categories scraping
#   C — Wikidata SPARQL étendu (P22/P25 parents)
#   D — Patronymes étendus × TM search
#   E — Squad scan complet + fiche individuelle (multi-nats)
#       Attrape les binationaux avec nationalité primaire FR/BE/DE et RDC en secondaire.
#       Coût : ~1.5s/joueur. Ligue 1 seule ≈ 15 min. Toutes ligues ≈ 6-8h.
#       Activer avec méthodes=A,B,C,D,E + timeout-minutes=240

on:
  schedule:
    # Samedi 01h UTC — hors des autres jobs (sync hebdo : lundi, discovery : dimanche)
    - cron: '0 1 * * 6'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (liste sans insérer)'
        required: false
        default: 'false'
        type: boolean
      methods:
        description: 'Méthodes à exécuter (virgule-séparées : A,B,C,D,E)'
        required: false
        default: 'A,B,C,D'
        type: string
      leagues:
        description: '[Méthode E] Ligues à scanner (ex: L1 ou L1,BEL1 — vide = toutes)'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  comprehensive-discovery:
    runs-on: ubuntu-latest
    # Timeout adapté : 60 min pour A-D, 240 min si méthode E activée (toutes ligues)
    timeout-minutes: 240
    concurrency:
      group: comprehensive-discovery
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run comprehensive discovery
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RATE_LIMIT_SECONDS: '1.5'
        working-directory: scripts
        run: |
          DRY_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          METHODS="${{ inputs.methods }}"
          if [ -z "$METHODS" ]; then
            METHODS="A,B,C,D"
          fi
          LEAGUES_FLAG=""
          if [ -n "${{ inputs.leagues }}" ]; then
            LEAGUES_FLAG="--leagues ${{ inputs.leagues }}"
          fi
          python comprehensive_discovery.py $DRY_FLAG --methods "$METHODS" $LEAGUES_FLAG
