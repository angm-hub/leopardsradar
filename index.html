<!doctype html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Léopards Radar</title>
    <meta name="description" content="Léopards Radar — radar éditorial premium des joueurs de la RDC et talents éligibles de la diaspora.">
    <meta name="author" content="Alexandre Ngomo" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Léopards Radar" />
    <meta property="og:url" content="https://angm-hub.github.io/leopardsradar/" />
    <!-- og:image fallback retiré : il pointait vers une preview Lovable
         périmée. À recréer comme asset de marque (Canva/Nanobanana) puis
         remettre ici. Les fiches joueurs surchargent og:image dynamiquement
         via useDocumentMeta avec leur photo. -->

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@leopardsradar" />

    <!-- Self-hosted fonts (latin + latin-ext only).
         Preload the 2 critical weights used in the fold (Fraunces 600 + DM Sans 400)
         so the browser fetches them in parallel with the CSS, instead of
         waiting for fonts.css to be parsed before discovering them.
         Saves ~200-400 ms LCP on cold cache.

         Relative paths so it works the same in dev (/) and prod (/leopardsradar/) —
         the browser resolves them from the page URL. -->
    <link rel="preload" href="./fonts/fraunces-600-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="./fonts/dm-sans-400-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="./fonts.css">
    <meta property="og:title" content="Léopards Radar">
  <meta name="twitter:title" content="Léopards Radar">
  <meta property="og:description" content="Léopards Radar — radar éditorial premium des joueurs de la RDC et talents éligibles de la diaspora.">
  <meta name="twitter:description" content="Léopards Radar — radar éditorial premium des joueurs de la RDC et talents éligibles de la diaspora.">
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
