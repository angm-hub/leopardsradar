<!doctype html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Léopards Radar</title>
    <meta name="description" content="Toute la data du football congolais. En un seul endroit. Joueurs RDC, diaspora éligible, statut FIFA recalculé chaque dimanche.">
    <meta name="author" content="Léopards Radar" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Léopards Radar" />
    <meta property="og:url" content="https://angm-hub.github.io/leopardsradar/" />
    <!-- Brand OG image — generated via Playwright capture of the editorial
         "og-card.html" template (Vercel/og pattern). 1200×630, dark
         editorial layout with the wordmark + key stats + Cobalt signature.
         Per-page meta override via useDocumentMeta on player profiles. -->
    <meta property="og:image" content="https://angm-hub.github.io/leopardsradar/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Léopards Radar — Toute la data du football congolais. Joueurs RDC, diaspora éligible, statut FIFA." />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@leopardsradar" />
    <meta name="twitter:image" content="https://angm-hub.github.io/leopardsradar/og-image.png" />

    <!-- Favicon — relative path so the asset resolves under /leopardsradar/
         on GH Pages (and keeps working at root in dev). Removes the
         /favicon.ico 404 from the console. -->
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />

    <!-- RSS feed — generated at build time from the published articles in
         the `articles` Supabase table. Discoverable by readers (Feedly,
         NetNewsWire, etc.) via the alternate link in <head>. -->
    <link rel="alternate" type="application/rss+xml" title="Léopards Radar — Histoires" href="./rss.xml" />

    <!-- Geist (Vercel · OFL) — single-family stack, mode "Premium DA Cobalt".
         La hiérarchie passe par tracking + poids, pas par mélange serif/mono.
         Preconnect + display=swap pour préserver le LCP. fonts.css legacy
         conservé en bas pour cascade graceful sur les composants pas encore
         migrés (Fraunces / DM Sans / Space Mono restent disponibles si une
         classe les nomme explicitement). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Ma Liste v2 — fonts dedies (cf. docs/DESIGN_MA_LISTE_V2.md) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./fonts.css">

    <!-- ====================================================================
         SPA fallback decoder pour GitHub Pages — hack rafgraph.
         Sprint 1.1 du brief Léopards Radar v3 (2026-05-15).

         Quand un deep-link arrive : public/404.html encode l'URL dans le
         query string ('?/roster?foo=bar') et redirige sur cette page.
         Le script ci-dessous décode ce query string et restaure l'URL
         d'origine via history.replaceState — avant que React Router ne
         s'initialise. Le user voit /roster correctement, le bot reçoit
         un HTTP 200, le partage de lien fonctionne.

         Source : https://github.com/rafgraph/spa-github-pages
         ==================================================================== -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
