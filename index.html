<!doctype html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Léopards Radar</title>
    <meta name="description" content="Toute la data du football congolais. En un seul endroit. Joueurs RDC, diaspora éligible, statut FIFA recalculé chaque dimanche.">
    <meta name="author" content="Léopards Radar" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Léopards Radar" />
    <meta property="og:url" content="https://angm-hub.github.io/leopardsradar/" />
    <!-- Brand OG image — generated via Playwright capture of the editorial
         "og-card.html" template (Vercel/og pattern). 1200×630, dark
         editorial layout with the wordmark + key stats + Cobalt signature.
         Per-page meta override via useDocumentMeta on player profiles. -->
    <meta property="og:image" content="https://angm-hub.github.io/leopardsradar/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Léopards Radar — Toute la data du football congolais. Joueurs RDC, diaspora éligible, statut FIFA." />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@leopardsradar" />
    <meta name="twitter:image" content="https://angm-hub.github.io/leopardsradar/og-image.png" />

    <!-- Favicon — relative path so the asset resolves under /leopardsradar/
         on GH Pages (and keeps working at root in dev). Removes the
         /favicon.ico 404 from the console. -->
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />

    <!-- RSS feed — generated at build time from the published articles in
         the `articles` Supabase table. Discoverable by readers (Feedly,
         NetNewsWire, etc.) via the alternate link in <head>. -->
    <link rel="alternate" type="application/rss+xml" title="Léopards Radar — Histoires" href="./rss.xml" />

    <!-- Self-hosted fonts (latin + latin-ext only).
         Preload the 2 critical weights used in the fold (Fraunces 600 + DM Sans 400)
         so the browser fetches them in parallel with the CSS, instead of
         waiting for fonts.css to be parsed before discovering them.
         Saves ~200-400 ms LCP on cold cache.

         Relative paths so it works the same in dev (/) and prod (/leopardsradar/) —
         the browser resolves them from the page URL. -->
    <link rel="preload" href="./fonts/fraunces-600-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="./fonts/dm-sans-400-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="./fonts.css">
    <meta property="og:title" content="Léopards Radar">
  <meta name="twitter:title" content="Léopards Radar">
  <meta property="og:description" content="Toute la data du football congolais. En un seul endroit. Joueurs RDC, diaspora éligible, statut FIFA recalculé chaque dimanche.">
  <meta name="twitter:description" content="Toute la data du football congolais. En un seul endroit. Joueurs RDC, diaspora éligible, statut FIFA recalculé chaque dimanche.">
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
