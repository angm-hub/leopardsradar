<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Léopards Radar — OG card</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=DM+Sans:wght@400;500&family=Space+Mono:wght@400;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'DM Sans', sans-serif;
    background:
      radial-gradient(ellipse 70% 80% at 30% 20%, rgba(0, 166, 81, 0.35) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(252, 209, 22, 0.08) 0%, transparent 60%),
      linear-gradient(180deg, #0a0e0a 0%, #050805 100%);
    color: #f5f5f5;
    position: relative;
  }
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 80%);
  }
  .wrap {
    position: relative;
    z-index: 2;
    height: 100%;
    padding: 64px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  /* Top row */
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .badge {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: #fcd116;
    border: 1px solid rgba(252, 209, 22, 0.4);
    padding: 8px 16px;
    border-radius: 4px;
  }
  .flag {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: rgba(255, 255, 255, 0.5);
  }
  .flag-bar {
    display: flex;
    height: 18px;
    width: 36px;
    border-radius: 2px;
    overflow: hidden;
  }
  .flag-bar > div { flex: 1; }
  /* Main content */
  .main {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 116px;
    line-height: 0.92;
    letter-spacing: -0.04em;
    color: #f5f5f5;
  }
  h1 em {
    font-style: italic;
    background: linear-gradient(90deg, #f5f5f5 0%, #fcd116 60%, #00a651 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .lede {
    font-size: 26px;
    line-height: 1.4;
    color: rgba(245, 245, 245, 0.75);
    max-width: 880px;
  }
  /* Bottom row */
  .bottom {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .stats {
    display: flex;
    gap: 56px;
  }
  .stat .num {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 48px;
    line-height: 1;
    color: #fcd116;
  }
  .stat .lab {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.5);
    margin-top: 6px;
  }
  .meta {
    text-align: right;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.4);
    line-height: 1.6;
  }
  .meta strong {
    color: rgba(252, 209, 22, 0.85);
    font-weight: normal;
  }
  /* Constellation overlay */
  .constellation {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="grid"></div>
<svg class="constellation" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- subtle dots representing the diaspora network -->
  <g fill="#fcd116" opacity="0.55">
    <circle cx="180" cy="430" r="3"/>
    <circle cx="240" cy="380" r="2.5"/>
    <circle cx="310" cy="450" r="3.5"/>
    <circle cx="380" cy="390" r="2"/>
    <circle cx="440" cy="470" r="3"/>
    <circle cx="500" cy="410" r="2.5"/>
    <circle cx="560" cy="460" r="3"/>
    <circle cx="620" cy="395" r="2"/>
    <circle cx="690" cy="445" r="3"/>
    <circle cx="760" cy="390" r="2.5"/>
    <circle cx="820" cy="455" r="3"/>
    <circle cx="900" cy="410" r="2"/>
    <circle cx="960" cy="465" r="3.5"/>
    <circle cx="1030" cy="395" r="2.5"/>
    <circle cx="1090" cy="450" r="3"/>
  </g>
  <g stroke="#fcd116" stroke-width="0.6" opacity="0.18" fill="none">
    <line x1="180" y1="430" x2="240" y2="380"/>
    <line x1="240" y1="380" x2="310" y2="450"/>
    <line x1="310" y1="450" x2="380" y2="390"/>
    <line x1="380" y1="390" x2="440" y2="470"/>
    <line x1="440" y1="470" x2="500" y2="410"/>
    <line x1="500" y1="410" x2="560" y2="460"/>
    <line x1="560" y1="460" x2="620" y2="395"/>
    <line x1="620" y1="395" x2="690" y2="445"/>
    <line x1="690" y1="445" x2="760" y2="390"/>
    <line x1="760" y1="390" x2="820" y2="455"/>
    <line x1="820" y1="455" x2="900" y2="410"/>
    <line x1="900" y1="410" x2="960" y2="465"/>
    <line x1="960" y1="465" x2="1030" y2="395"/>
    <line x1="1030" y1="395" x2="1090" y2="450"/>
  </g>
</svg>

<div class="wrap">
  <div class="top">
    <span class="badge">Léopards Radar</span>
    <div class="flag">
      <div class="flag-bar">
        <div style="background:#007fff"></div>
        <div style="background:#fcd116"></div>
        <div style="background:#ce1021"></div>
      </div>
      <span>RD Congo · Diaspora</span>
    </div>
  </div>

  <div class="main">
    <h1>Les yeux sur tous<br><em>les Léopards.</em></h1>
    <p class="lede">
      Roster RDC + diaspora éligible — radar éditorial premium, sources vérifiées, statut FIFA recalculé chaque dimanche.
    </p>
  </div>

  <div class="bottom">
    <div class="stats">
      <div class="stat">
        <div class="num">1063</div>
        <div class="lab">Profils suivis</div>
      </div>
      <div class="stat">
        <div class="num">22</div>
        <div class="lab">Pays</div>
      </div>
      <div class="stat">
        <div class="num">615 M€</div>
        <div class="lab">Valeur cumulée</div>
      </div>
    </div>
    <div class="meta">
      Édité par <strong>Cobalt Sports & Entertainment</strong><br>
      leopardsradar.com
    </div>
  </div>
</div>
</body>
</html>
